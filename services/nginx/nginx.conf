events {}

http {
    upstream frontend_pool {
        server frontend_service:3000;
    }
    
    upstream api_pool {
        server api_service:5000;
    }

    upstream ws_ingestion_pool {
        ip_hash; # for sticky session (so that multi-step handshake's steps land on the same server)
        server ws_ingestion_service:8080;
    }

    server {
        listen 80;
    
        location /ws/ {
            proxy_pass http://ws_ingestion_pool/;

            # required for ws upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        
            # to avoid nginx closing off connection quickly
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;

            # passing client info forward
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://api_pool/;
            
            # passing client info forward
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend_pool;

            # passing client info forward
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}